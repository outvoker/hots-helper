# Render Blueprint — one-click deploy of the HotS Helper web service.
# Render builds the repo-root Dockerfile (multi-stage: SPA + slim Python
# runtime) and injects $PORT, which hots-web already honours.
#
# Deploy: render.com → New → Blueprint → pick this repo. Render will
# prompt only for HOTS_ACCESS_PASSWORD (sync: false = "ask me, don't
# store in the repo").
#
# The Supabase project is baked into the source (sync_defaults.py, a
# publishable anon key), so SUPABASE_URL / SUPABASE_ANON_KEY are NOT
# required — set them only to point a private deployment at a different
# project.
services:
  - type: web
    name: hots-helper
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: HOTS_ACCESS_PASSWORD
        sync: false
      - key: HOTS_REFRESH_SECONDS
        value: "600"
